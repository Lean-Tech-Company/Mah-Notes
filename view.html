<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View - My Notes</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/view.css">
</head>
<body>
    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Saving...</div>
    </div>

    <header>
        <div class="header-content">
            <div class="logo" id="header-logo">
                <img src="images/logo.png" alt="My Notes" class="logo-img">
            </div>
            <div class="nav-buttons">
                <button class="btn btn-login" id="login-btn" style="display:none;" onclick="window.location.href='login.html'">
                    <i class="fas fa-sign-in-alt"></i> Log In
                </button>
                <button class="btn btn-signup" id="signup-btn" style="display:none;" onclick="window.location.href='login.html#signup'">
                    <i class="fas fa-user-plus"></i> Sign Up
                </button>
                <button class="btn back-btn" id="back-btn">
                    <i class="fas fa-arrow-left"></i> Back to App
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="content-area">
            <!-- Content will be dynamically loaded here -->
        </div>
    </div>


    <script type="module" src="js/view.js"></script>
</body>
</html>
